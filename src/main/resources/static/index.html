<!DOCTYPE html>
<html>
  <head>
      <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
      <title>Advanced Chat Application | Spring Boot WebSocket</title>
      <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body>
    <noscript>
      <h2>Sorry! Your browser doesn't support Javascript</h2>
    </noscript>

    <!-- Login Page -->
    <div id="username-page">
        <div class="username-page-container">
            <h1 class="title">Welcome to Chat</h1>
            <form id="usernameForm" name="usernameForm">
                <div class="form-group">
                    <input type="text" id="name" placeholder="Enter your username" autocomplete="off" class="form-control" />
                </div>
                <div class="form-group">
                    <button type="submit" class="accent username-submit">Start Chatting</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Main Chat Application -->
    <div id="chat-page" class="hidden">
        <div class="chat-app">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <div class="user-profile">
                        <div class="user-avatar" id="currentUserAvatar"></div>
                        <div class="user-info">
                            <div class="username" id="currentUsername"></div>
                            <div class="user-status" id="currentUserStatus">Online</div>
                        </div>
                    </div>
                    <button class="btn-create-chat" id="createChatBtn">+ New Chat</button>
                </div>
                
                <div class="sidebar-content">
                    <div class="chat-list-header">
                        <h3>Chats</h3>
                        <span class="chat-count" id="chatCount">0</span>
                    </div>
                    
                    <!-- Create Chat Box (shown when no chats exist) -->
                    <div id="createChatBox" class="create-chat-box hidden">
                        <div class="create-chat-content">
                            <h4>Welcome! Create your first chat</h4>
                            <form id="quickCreateChatForm">
                                <div class="form-group">
                                     <label for="quickChatName">Chat Name</label>
                                    <input type="text" id="quickChatName" placeholder="Enter chat name" required>
                                </div>
                                <div class="form-group">
                                    <label for="quickParticipants">Add Participants</label>
                                    <select id="quickParticipants" multiple class="user-select">
                                        <option value="">Loading users...</option>
                                    </select>
                                    <small class="form-help">Hold Ctrl/Cmd to select multiple users</small>
                                </div>
                                <div class="participant-preview" id="participantPreview"></div>
                                <button type="submit" class="btn-primary">Create Chat</button>
                            </form>
                        </div>
                    </div>
                    
                    <!-- Chat List (shown when chats exist) -->
                    <div class="chat-list" id="chatList">
                        <!-- Chat items will be dynamically added here -->
                    </div>
                    
                    <!-- Empty State Message -->
                    <div id="emptyChatMessage" class="empty-chat-message hidden">
                        <p>No chats yet. Click "New Chat" to create your first chat!</p>
                    </div>
                </div>
            </div>

            <!-- Main Chat Area -->
            <div class="main-chat">
                <div class="chat-header" id="chatHeader">
                    <div class="chat-info">
                        <h2 id="currentChatName">Select a chat</h2>
                        <div class="chat-participants" id="chatParticipants"></div>
                    </div>
                    <div class="chat-actions">
                        <button class="btn-icon" id="leaveChatBtn" title="Leave chat">leave</button>
                    </div>
                </div>
                
                <div class="connecting" id="connectingStatus">
                    Connecting...
                </div>
                
                <div class="messages-container">
                    <ul id="messageArea" class="message-list">
                        <!-- Messages will be dynamically added here -->
                    </ul>
                </div>
                
                <div class="message-input-container" id="messageInputContainer">
                    <form id="messageForm" name="messageForm">
                        <div class="input-group">
                            <input type="text" id="message" placeholder="Type a message..." autocomplete="off" class="form-control"/>
                            <button type="submit" class="btn-send">Send</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Chat Modal -->
    <div id="createChatModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Create New Chat</h3>
                <button class="close-btn" id="closeModalBtn">&times;</button>
            </div>
            <form id="createChatForm">
                <div class="form-group">
                    <label for="chatName">Chat Name</label>
                    <input type="text" id="chatName" placeholder="Enter chat name" required>
                </div>
                <div class="form-group">
                    <label for="participants">Participants</label>
                    <select id="participants" multiple class="user-select">
                        <option value="">Loading users...</option>
                    </select>
                    <small class="form-help">Hold Ctrl/Cmd to select multiple users</small>
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="isGroupChat">
                        Group Chat
                    </label>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelCreateBtn">Cancel</button>
                    <button type="submit" class="btn-primary">Create Chat</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.1.4/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
